# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json
---

# Variables used in this pipeline are defined in `shared-pipeline-vars`, which is `source`'d before calling `buidkite-agent pipeline upload`

agents:
  queue: "mac"
env:
  IMAGE_ID: $IMAGE_ID

steps:
  - label: ":swift: SwiftFormat Linting"
    key: swiftformat-lint
    plugins:
      - docker#v5.12.0:
          image: "ghcr.io/nicklockwood/swiftformat:$SWIFTFORMAT_VERSION"
          command: [ "GravatarApp", "GravatarAppTests", "Packages", "--lint" ]
          workdir: "${BUILDKITE_BUILD_CHECKOUT_PATH}"
    notify:
      - github_commit_status:
          context: "SwiftFormat Linting"
    agents:
      queue: "default"

  - label: "🧪 Tests"
    key: tests
    command: |
      make setup
      xcodebuild test -project GravatarApp.xcodeproj -scheme GravatarApp -destination 'platform=iOS Simulator,name=iPhone 16,arch=arm64'
    notify:
      - github_commit_status:
          context: "Unit tests"

  - group: Prototype Build
    steps:
      - label: Package Prototype Build
        key: prototype_build
        command: |
          make setup-internal
          .buildkite/commands/build_prototype.sh
        plugins: [$CI_TOOLKIT]
        artifact_paths:
          - ".build/artifacts/*.ipa"
          - ".build/artifacts/*.app.dSYM.zip"
        notify:
          - github_commit_status:
              context: Package Prototype Build

      - label: Distribute Prototype Build
        depends_on: prototype_build
        command: .buildkite/commands/distribute_prototype.sh
        plugins: [$CI_TOOLKIT]
        notify:
          - github_commit_status:
              context: Distribute Prototype Build
